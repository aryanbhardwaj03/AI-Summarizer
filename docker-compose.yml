services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: studyai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: study_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Ollama LLM Backend (optional — if using local LLM) ──────────────
  ollama:
    image: ollama/ollama:latest
    container_name: studyai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - local-llm  # Only starts with: docker compose --profile local-llm up
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: studyai-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/study_assistant
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: studyai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  backend_data:
